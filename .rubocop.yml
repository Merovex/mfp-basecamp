AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Metrics/MethodLength:
  Max: 20
  Exclude:
    - 'lib/basecamp_mcp/setup.rb'

Metrics/ClassLength:
  Max: 150

Metrics/AbcSize:
  Max: 25
  Exclude:
    - 'lib/basecamp_mcp/setup.rb'

Metrics/BlockLength:
  Exclude:
    - '*.gemspec'
    - 'spec/**/*'

Metrics/ParameterLists:
  Max: 10
  CountKeywordArgs: false

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Layout/LineLength:
  Max: 120
  AllowedPatterns:
    - 'description '

Gemspec/DevelopmentDependencies:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false
